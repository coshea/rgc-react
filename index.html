<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/rgc_fav.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/rgc_fav.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0a4d1a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Ridgefield Golf Club</title>
    <meta name="title" content="Ridgefield Golf Club" />
    <meta
      name="description"
      content="Ridgefield Golf Club - Your premier golf destination. View tournaments, standings, membership information, and more."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ridgefieldgolf.club/" />
    <meta property="og:title" content="Ridgefield Golf Club" />
    <meta
      property="og:description"
      content="Ridgefield Golf Club - Your premier golf destination. View tournaments, standings, membership information, and more."
    />
    <meta
      property="og:image"
      content="https://www.ridgefieldgolf.club/preview.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Ridgefield Golf Club - Member Portal & Tournament Management"
    />
    <meta property="og:site_name" content="Ridgefield Golf Club" />
    <meta property="og:locale" content="en_US" />

    <!-- Google reCAPTCHA v3 -->
    <script
      src="https://www.google.com/recaptcha/api.js?render=%VITE_RECAPTCHA_SITE_KEY%"
      async
      defer
    ></script>

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.ridgefieldgolf.club/" />
    <meta property="twitter:title" content="Ridgefield Golf Club" />
    <meta
      property="twitter:description"
      content="Ridgefield Golf Club - Your premier golf destination. View tournaments, standings, membership information, and more."
    />
    <meta
      property="twitter:image"
      content="https://www.ridgefieldgolf.club/preview.png"
    />
    <meta
      property="twitter:image:alt"
      content="Ridgefield Golf Club - Member Portal & Tournament Management"
    />

    <!-- Mobile Web App Capable -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="RGC" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
