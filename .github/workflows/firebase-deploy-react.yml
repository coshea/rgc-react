name: Deploy to Firebase Hosting (legacy/manual)

# Disabled automatic push trigger to avoid duplicate deployments.
# Use the consolidated `firebase-hosting-merge.yml` for automatic deploys on push to `main`.
on:
  workflow_dispatch: {}

jobs:
  build_and_deploy-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          # Firebase CLI v14+ requires Node >=20; use Node 22 for compatibility
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
      - name: Build
        env:
          VITE_PAYPAL_CLIENT_ID: ${{ secrets.VITE_PAYPAL_CLIENT_ID }}
          VITE_PAYPAL_ENVIRONMENT: ${{ secrets.VITE_PAYPAL_ENVIRONMENT }}
          VITE_FIREBASE_FUNCTIONS_BASE_URL: ${{ secrets.VITE_FIREBASE_FUNCTIONS_BASE_URL }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_SENTRY_ENABLE_LOGS: ${{ secrets.VITE_SENTRY_ENABLE_LOGS }}
        run: npm run build
      - name: Deploy to Firebase (manual)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_RIDGEFIELD_GOLF_CLUB }}"
          channelId: live
          projectId: rgc-react
