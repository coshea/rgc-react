name: Deploy Firebase Functions (TypeScript)

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-deploy-functions.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy-functions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install function dependencies
        working-directory: ./functions
        run: |
          npm ci

      - name: Run function unit tests
        working-directory: ./functions
        run: |
          npm test

      - name: Build functions
        working-directory: ./functions
        run: |
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_RIDGEFIELD_GOLF_CLUB }}' > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Cloud Functions
        run: |
          firebase deploy --only functions:rgcReact --project ridgefield-golf-club --non-interactive
        env:
          PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
          PAYPAL_CLIENT_SECRET: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          PAYPAL_ENVIRONMENT: ${{ secrets.PAYPAL_ENVIRONMENT }}
